
<style>
*{margin:0;padding:0;box-sizing:border-box}
.hero{
  position:relative;height:600px;background:#09080a;
  overflow:hidden;display:flex;flex-direction:column;align-items:center;
  font-family:'Gill Sans','Gill Sans MT',Calibri,'Trebuchet MS',sans-serif;
}
.rwy{position:absolute;bottom:0;left:0;right:0;height:55%;pointer-events:none;z-index:1}
.stage{position:absolute;bottom:0;left:0;right:0;height:100%;z-index:2}
.fw{
  position:absolute;left:50%;bottom:0;
  transform-origin:bottom center;
  animation:rw 9s cubic-bezier(.37,.0,.63,1) infinite;
  opacity:0;z-index:1;
}
.fw:nth-child(1){animation-delay:0s}
.fw:nth-child(2){animation-delay:3s}
.fw:nth-child(3){animation-delay:6s}
.fb{animation:bob .52s ease-in-out infinite alternate;transform-origin:bottom center}
@keyframes rw{
  0%{transform:translateX(-50%) translateY(-265px) scale(.13);opacity:0}
  9%{opacity:.7}
  43%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
  48%{transform:translateX(-50%) translateY(-7px) scale(1.025) rotate(-1.6deg);opacity:1}
  54%{transform:translateX(-50%) translateY(-7px) scale(1.025) rotate(1.6deg);opacity:1}
  60%{transform:translateX(-50%) translateY(0) scale(1);opacity:1}
  74%{transform:translateX(calc(-50% - 180px)) translateY(0) scale(.72);opacity:.45}
  84%{transform:translateX(calc(-50% - 380px)) translateY(0) scale(.38);opacity:0}
  100%{transform:translateX(calc(-50% - 380px)) translateY(0) scale(.38);opacity:0}
}
@keyframes bob{from{transform:translateY(0) rotate(-.45deg)}to{transform:translateY(-4px) rotate(.45deg)}}
.hd{
  position:relative;z-index:20;text-align:center;
  padding-top:5.5vh;pointer-events:none;
}
.brand{
  font-size:.6rem;letter-spacing:.65em;color:#b8946a;
  text-transform:uppercase;margin-bottom:.8rem;font-weight:400;
}
.htitle{
  font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  font-size:clamp(2.9rem,7.5vw,5.4rem);font-weight:400;
  color:#edeae2;line-height:.86;letter-spacing:-.01em;
}
.htitle em{font-style:italic;color:#c9a87a}
.hsub{
  font-size:.56rem;letter-spacing:.5em;color:#38332e;
  text-transform:uppercase;margin-top:1.1rem;font-weight:400;
}
.oi{
  position:absolute;z-index:20;top:44%;right:7%;
  text-align:right;transition:opacity .45s ease,transform .45s ease;
}
.oin{
  font-family:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  font-size:.95rem;font-weight:400;color:#edeae2;
  letter-spacing:.06em;margin-bottom:.35rem;font-style:italic;
}
.oip{font-size:.58rem;letter-spacing:.38em;color:#b8946a;font-weight:400}
.sideline{
  position:absolute;right:calc(7% + 115px);top:44%;z-index:20;
  width:1px;height:36px;background:#2a2520;
}
.ctr{
  position:absolute;z-index:20;left:7%;top:48%;
  transform:translateY(-50%);display:flex;flex-direction:column;
  align-items:center;gap:.45rem;
}
.cnum{
  font-family:'Palatino Linotype',Georgia,serif;
  font-size:.88rem;font-weight:400;color:#b8946a;
  transition:opacity .35s;letter-spacing:.1em;
}
.cline{width:1px;height:38px;background:#252118}
.ctot{font-size:.55rem;letter-spacing:.2em;color:#332e2a;font-weight:400}
.cta{
  position:absolute;bottom:5.5%;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:2.2rem;align-items:center;
}
.cbtn{
  font-family:'Gill Sans','Gill Sans MT',sans-serif;
  font-size:.58rem;letter-spacing:.42em;text-transform:uppercase;
  color:#09080a;background:#b8946a;border:none;
  padding:.85rem 2.3rem;cursor:pointer;font-weight:400;
  transition:background .22s;
}
.cbtn:hover{background:#c9a87a}
.clink{
  font-size:.56rem;letter-spacing:.42em;text-transform:uppercase;
  color:#edeae2;text-decoration:none;border-bottom:1px solid #2f2a25;
  padding-bottom:2px;font-weight:400;opacity:.8;
}
.floorline{
  position:absolute;bottom:14.8%;left:0;right:0;height:1px;
  background:#1d1a16;z-index:3;pointer-events:none;
}
.catstep{
  position:absolute;bottom:6%;left:50%;transform:translateX(-50%);
  z-index:20;display:flex;gap:8px;align-items:center;
}
.dot{width:5px;height:5px;background:#2a2520;transition:background .4s}
.dot.active{background:#b8946a}
</style>

<script>
var outfits=[
  {name:'Robe Lumière',price:'€ 4,200'},
  {name:'Le Tailleur',price:'€ 3,850'},
  {name:'Minuit Doré',price:'€ 2,100'}
];
var cur=0;
var oin=document.getElementById('oin');
var oip=document.getElementById('oip');
var cnum=document.getElementById('cnum');
var oi=document.getElementById('oi');
var figs=[document.getElementById('f0'),document.getElementById('f1'),document.getElementById('f2')];
var dots=[document.getElementById('d0'),document.getElementById('d1'),document.getElementById('d2')];

oi.style.transition='opacity .45s ease';
cnum.style.transition='opacity .32s';

function update(n,anim){
  if(anim){
    oi.style.opacity='0';
    cnum.style.opacity='0';
    setTimeout(function(){
      oin.textContent=outfits[n].name;
      oip.textContent=outfits[n].price;
      cnum.textContent=String(n+1).padStart(2,'0');
      oi.style.opacity='1';
      cnum.style.opacity='1';
    },400);
  } else {
    oin.textContent=outfits[n].name;
    oip.textContent=outfits[n].price;
    cnum.textContent=String(n+1).padStart(2,'0');
  }
  figs.forEach(function(f,i){ f.style.zIndex = i===n?'6':'1'; });
  dots.forEach(function(d,i){ d.className='dot'+(i===n?' active':''); });
}

update(0,false);
setInterval(function(){
  cur=(cur+1)%3;
  update(cur,true);
},3000);
</script>
